<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ujGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="ujGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background subtle ring -->
  <circle cx="50" cy="50" r="44" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08" />
  
  <!-- Outer accent glowing ring -->
  <circle cx="50" cy="50" r="44" stroke="url(#ujGrad)" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="10 15 30 15" />

  <!-- Monogram U+J -->
  <path d="M30 30 V50 A20 20 0 0 0 70 50 V30 V65 A10 10 0 0 1 50 65" 
        stroke="url(#ujGrad)" 
        stroke-width="9" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#ujGlow)" />
</svg>
