  </g>

  <text x="85" y="47" fill="#FFFFFF" font-family="'Space Grotesk', system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.03em">UJ <tspan fill="url(#ujGrad)">Nexus</tspan></text>
  <text x="85" y="63" fill="#94A3B8" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.2em">PREMIUM DIGITAL AGENCY</text>
