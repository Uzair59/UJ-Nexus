  </defs>

  <g transform="translate(10, 10) scale(0.6)">
    <circle cx="50" cy="50" r="44" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08" />
    <circle cx="50" cy="50" r="44" stroke="url(#ujGrad)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="10 15 30 15" />
    <path d="M30 30 V50 A20 20 0 0 0 70 50 V30 V65 A10 10 0 0 1 50 65" 
